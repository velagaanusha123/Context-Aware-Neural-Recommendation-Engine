<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>H&M – For You</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .rec-header {
      padding: 28px 30px 0;
    }
    .rec-header h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .rec-header p { font-size: 13px; color: #888; }
    .reason-tag {
      display: inline-block;
      background: #fff3f3;
      color: #E50010;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 3px;
      margin-bottom: 6px;
      border: 1px solid #ffd0d0;
    }
    .empty-state {
      text-align: center;
      padding: 80px 30px;
      color: #888;
    }
    .empty-state h3 { font-size: 20px; margin-bottom: 10px; color: #444; }
    .empty-state a {
      display: inline-block; margin-top: 16px;
      padding: 10px 24px; background: #E50010;
      color: white; text-decoration: none; border-radius: 3px; font-size: 14px;
    }
    .toast {
      position: fixed; bottom: 30px; right: 30px;
      background: #222; color: white;
      padding: 12px 20px; border-radius: 6px;
      font-size: 13px; opacity: 0;
      transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="navbar">
    <h1>H&M</h1>
    <div>
      <a href="home.html">Products</a>
      <a href="wishlist.html">Wishlist ♡</a>
      <a href="login.html" onclick="logout()">Logout</a>
    </div>
  </div>

  <div class="rec-header">
    <h2 id="rec-title">Recommended For You</h2>
    <p id="rec-subtitle">Based on your wishlist choices</p>
  </div>

  <div class="product-grid" id="rec-grid"></div>
  <div class="toast" id="toast"></div>

<script src="js/mockdata.js"></script>
<script>
  const user = JSON.parse(localStorage.getItem('currentUser'));
  if (!user) { window.location.href = 'login.html'; }
  else { document.getElementById('rec-title').textContent = 'Recommended For ' + user.name; }

  function getWishlist() {
    return JSON.parse(localStorage.getItem('wishlist')) || [];
  }

  function getRecommendations() {
    const wishlist = getWishlist();

    // If wishlist is empty, can't recommend
    if (wishlist.length === 0) return { items: [], reason: '' };

    // Find the most common category in wishlist
    const categoryCounts = {};
    wishlist.forEach(w => {
      categoryCounts[w.category] = (categoryCounts[w.category] || 0) + 1;
    });
    const topCategory = Object.keys(categoryCounts)
      .reduce((a, b) => categoryCounts[a] > categoryCounts[b] ? a : b);

    // Recommend products from same category NOT already in wishlist
    const wishlistIds = wishlist.map(w => w.id);
    const recommended = products.filter(p =>
      p.category === topCategory && !wishlistIds.includes(p.id)
    );

    // If not enough from top category, add other products too
    const others = products.filter(p =>
      p.category !== topCategory && !wishlistIds.includes(p.id)
    );

    return {
      items: [...recommended, ...others].slice(0, 6),
      reason: topCategory
    };
  }

  function toggleWishlist(productId) {
    let wishlist = getWishlist();
    const product  = products.find(p => p.id === productId);
    const index    = wishlist.findIndex(w => w.id === productId);
    const heartBtn = document.getElementById('heart-' + productId);

    if (index === -1) {
      wishlist.push(product);
      heartBtn.textContent = '♥';
      heartBtn.classList.add('active');
      showToast('Added to Wishlist!');
    } else {
      wishlist.splice(index, 1);
      heartBtn.textContent = '♡';
      heartBtn.classList.remove('active');
      showToast('Removed from Wishlist');
    }
    localStorage.setItem('wishlist', JSON.stringify(wishlist));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function renderRecommendations() {
    const grid = document.getElementById('rec-grid');
    const { items, reason } = getRecommendations();
    grid.innerHTML = '';

    if (items.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <h3>No recommendations yet</h3>
          <p>Add some products to your wishlist first and we'll suggest similar items.</p>
          <a href="home.html">Browse Products</a>
        </div>`;
      return;
    }

    items.forEach(product => {
      const wishlist    = getWishlist();
      const isWishlisted = wishlist.some(w => w.id === product.id);
      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <img src="${product.image}" alt="${product.name}">
        <div class="card-info">
          <button class="heart-btn ${isWishlisted ? 'active' : ''}"
                  onclick="toggleWishlist(${product.id})"
                  id="heart-${product.id}">
            ${isWishlisted ? '♥' : '♡'}
          </button>
          <div class="reason-tag">Because you liked ${reason}</div>
          <div class="category">${product.category}</div>
          <h3>${product.name}</h3>
          <div class="price">₹${product.price}</div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function logout() { localStorage.removeItem('currentUser'); }

  renderRecommendations();
</script>

</body>
</html>
